<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password · MessPay Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pastelBlue: '#bfdbfe',
              pastelBlueSoft: '#e0f2fe',
              mintGreen: '#a7f3d0',
              mintGreenSoft: '#d1fae5',
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-pastelBlueSoft to-mintGreenSoft text-slate-900">
    <header class="border-b border-white/40 bg-white/60 backdrop-blur sticky top-0 z-10">
      <div class="max-w-3xl mx-auto flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <span
            class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-tr from-pastelBlue to-mintGreen shadow-sm"
          >
            <i data-lucide="key-round" class="w-5 h-5 text-slate-800"></i>
          </span>
          <div class="leading-tight">
            <p class="font-semibold tracking-tight">MessPay</p>
            <p class="text-xs text-slate-600">Change password</p>
          </div>
        </div>
        <a
          href="profile.html"
          class="px-3 py-1.5 rounded-full text-slate-800/80 bg-white/70 hover:bg-white shadow-sm text-xs transition"
          >Back to profile</a
        >
      </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8 flex items-start justify-center">
      <div
        class="bg-white/85 backdrop-blur rounded-[18px] shadow-lg border border-white/80 w-full max-w-md p-5 sm:p-6 space-y-4"
      >
        <div class="flex items-center gap-3">
          <div
            class="h-10 w-10 rounded-[16px] bg-gradient-to-tr from-pastelBlue to-pastelBlueSoft flex items-center justify-center shadow-sm"
          >
            <i data-lucide="lock" class="w-5 h-5 text-slate-900"></i>
          </div>
          <div class="leading-tight">
            <p class="text-sm font-semibold tracking-tight">Update your password</p>
            <p class="text-[11px] text-slate-500">Use a strong password you don&apos;t reuse elsewhere.</p>
          </div>
        </div>

        <form id="change-password-form" class="space-y-3 text-sm">
          <div>
            <label for="current-password" class="block text-xs font-medium text-slate-700 mb-1.5"
              >Current password</label
            >
            <input
              id="current-password"
              type="password"
              required
              class="w-full rounded-xl border border-slate-200 bg-slate-50/70 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pastelBlue focus:border-transparent"
            />
          </div>

          <div>
            <label for="new-password" class="block text-xs font-medium text-slate-700 mb-1.5">New password</label>
            <input
              id="new-password"
              type="password"
              required
              minlength="6"
              class="w-full rounded-xl border border-slate-200 bg-slate-50/70 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-mintGreen focus:border-transparent"
            />
          </div>

          <div>
            <label for="confirm-password" class="block text-xs font-medium text-slate-700 mb-1.5"
              >Confirm new password</label
            >
            <input
              id="confirm-password"
              type="password"
              required
              minlength="6"
              class="w-full rounded-xl border border-slate-200 bg-slate-50/70 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-mintGreen focus:border-transparent"
            />
          </div>

          <button
            type="submit"
            class="mt-1 w-full inline-flex items-center justify-center gap-2 rounded-xl bg-slate-900 text-white text-sm font-medium py-2.5 shadow-sm hover:bg-slate-800 transition"
          >
            <i data-lucide="check-circle-2" class="w-4 h-4"></i>
            <span>Change password</span>
          </button>

          <p id="change-password-status" class="text-[11px] text-slate-500 text-center mt-1"></p>
        </form>
      </div>
    </main>

    <script>
      const form = document.getElementById('change-password-form');
      const statusEl = document.getElementById('change-password-status');

      form.addEventListener('submit', (event) => {
        event.preventDefault();

        const currentPassword = document.getElementById('current-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
          statusEl.textContent = 'New passwords do not match.';
          statusEl.classList.remove('text-emerald-600');
          statusEl.classList.add('text-red-500');
          return;
        }

        // TODO: Wire this to Firebase Auth updatePassword() using the current user session.
        console.log('Change password payload →', { currentPassword, newPassword });

        statusEl.textContent = 'Password updated (mock). Connect this to Firebase Auth in js/auth.js.';
        statusEl.classList.remove('text-red-500');
        statusEl.classList.add('text-emerald-600');
        form.reset();
      });

      if (window.lucide) {
        window.lucide.createIcons();
      }
    </script>
  </body>
</html>
