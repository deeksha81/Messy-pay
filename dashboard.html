<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard · MessPay Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pastelBlue: '#bfdbfe',
              pastelBlueSoft: '#e0f2fe',
              mintGreen: '#a7f3d0',
              mintGreenSoft: '#d1fae5',
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="min-h-screen flex flex-col pb-16">
      <!-- Top navigation -->
      <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span
              class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-tr from-pastelBlue to-mintGreen shadow-sm"
            >
              <i data-lucide="wallet" class="w-5 h-5 text-slate-800"></i>
            </span>
            <div class="leading-tight">
              <p class="text-xs font-medium text-slate-500">MessPay Student Portal</p>
              <p class="text-sm font-semibold tracking-tight">Dashboard</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <div class="hidden sm:flex flex-col items-end">
              <span class="text-xs text-slate-500">Welcome,</span>
              <span class="text-sm font-medium text-slate-900">Student</span>
            </div>
            <a
              href="profile.html"
              class="relative h-9 w-9 rounded-full bg-gradient-to-tr from-pastelBlueSoft to-mintGreenSoft flex items-center justify-center border border-white shadow-sm"
            >
              <span class="text-xs font-semibold text-slate-800">S</span>
              <span
                class="absolute -bottom-0.5 -right-0.5 h-3 w-3 rounded-full bg-emerald-500 border border-white"
                aria-hidden="true"
              ></span>
            </a>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1">
        <div class="max-w-6xl mx-auto px-4 py-6 space-y-6">
          <!-- Hero balance card -->
          <section>
            <div
              class="rounded-3xl bg-gradient-to-br from-pastelBlueSoft via-white to-mintGreenSoft border border-white shadow-sm p-5 sm:p-6 flex flex-col gap-4"
            >
              <div class="flex items-center justify-between gap-4">
                <div>
                  <p class="text-xs font-medium text-slate-600 uppercase tracking-[0.12em]">Current balance</p>
                  <p class="mt-2 text-3xl sm:text-4xl font-semibold text-slate-900">&#8377; 1,250</p>
                  <p class="mt-1 text-xs text-slate-600">Covers approximately 10–12 regular meals.</p>
                </div>
                <div class="hidden sm:flex flex-col items-end gap-1 text-xs text-slate-600">
                  <div class="inline-flex items-center gap-1 rounded-full bg-white/70 px-2 py-1 border border-slate-100">
                    <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
                    Live · Mess open
                  </div>
                  <span>Hostel A · Room 212</span>
                </div>
              </div>

              <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 text-xs text-slate-600">
                <div class="flex gap-3">
                  <div>
                    <p class="mb-0.5">Today&apos;s spend</p>
                    <p class="font-semibold text-slate-900">&#8377; 120</p>
                  </div>
                  <div>
                    <p class="mb-0.5">This week</p>
                    <p class="font-semibold text-slate-900">&#8377; 680</p>
                  </div>
                </div>
                <button
                  class="inline-flex items-center justify-center gap-2 rounded-2xl bg-slate-900 text-white text-sm font-medium px-4 py-2 shadow-sm hover:bg-slate-800 self-stretch sm:self-auto"
                >
                  <i data-lucide="bolt" class="w-4 h-4"></i>
                  <span>Quick Recharge</span>
                </button>
              </div>
            </div>
          </section>

          <!-- Quick actions grid -->
          <section aria-label="Quick actions">
            <div class="flex items-center justify-between mb-2">
              <h2 class="text-sm font-medium text-slate-800">Quick actions</h2>
              <span class="text-[11px] text-slate-500">Tap to jump into key flows</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
              <button
                class="group rounded-2xl bg-white border border-slate-200/80 shadow-sm px-3 py-3 sm:px-4 sm:py-4 flex flex-col items-start gap-2 text-left hover:border-pastelBlue hover:shadow-md transition"
              >
                <span
                  class="inline-flex h-8 w-8 items-center justify-center rounded-2xl bg-pastelBlueSoft text-slate-800 group-hover:bg-pastelBlue"
                >
                  <i data-lucide="utensils-crossed" class="w-4 h-4"></i>
                </span>
                <div>
                  <p class="text-xs font-medium text-slate-900">Today&apos;s Menu</p>
                  <p class="text-[11px] text-slate-500">See breakfast, lunch, dinner</p>
                </div>
              </button>

              <button
                class="group rounded-2xl bg-white border border-slate-200/80 shadow-sm px-3 py-3 sm:px-4 sm:py-4 flex flex-col items-start gap-2 text-left hover:border-pastelBlue hover:shadow-md transition"
              >
                <span
                  class="inline-flex h-8 w-8 items-center justify-center rounded-2xl bg-mintGreenSoft text-slate-800 group-hover:bg-mintGreen"
                >
                  <i data-lucide="history" class="w-4 h-4"></i>
                </span>
                <div>
                  <p class="text-xs font-medium text-slate-900">Meal History</p>
                  <p class="text-[11px] text-slate-500">Track past mess visits</p>
                </div>
              </button>

              <button
                class="group rounded-2xl bg-white border border-slate-200/80 shadow-sm px-3 py-3 sm:px-4 sm:py-4 flex flex-col items-start gap-2 text-left hover:border-pastelBlue hover:shadow-md transition"
              >
                <span
                  class="inline-flex h-8 w-8 items-center justify-center rounded-2xl bg-pastelBlueSoft text-slate-800 group-hover:bg-pastelBlue"
                >
                  <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                </span>
                <div>
                  <p class="text-xs font-medium text-slate-900">Attendance</p>
                  <p class="text-[11px] text-slate-500">View mess entry log</p>
                </div>
              </button>

              <button
                class="group rounded-2xl bg-white border border-slate-200/80 shadow-sm px-3 py-3 sm:px-4 sm:py-4 flex flex-col items-start gap-2 text-left hover:border-pastelBlue hover:shadow-md transition"
              >
                <span
                  class="inline-flex h-8 w-8 items-center justify-center rounded-2xl bg-mintGreenSoft text-slate-800 group-hover:bg-mintGreen"
                >
                  <i data-lucide="life-buoy" class="w-4 h-4"></i>
                </span>
                <div>
                  <p class="text-xs font-medium text-slate-900">Support</p>
                  <p class="text-[11px] text-slate-500">Raise an issue or query</p>
                </div>
              </button>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- Bottom navigation -->
    <nav
      class="fixed inset-x-0 bottom-0 z-20 border-t border-slate-200 bg-white/95 backdrop-blur py-1.5"
      aria-label="Primary"
    >
      <div class="max-w-md mx-auto px-6">
        <ul class="flex items-center justify-between text-xs text-slate-500">
          <li>
            <a href="dashboard.html" class="flex flex-col items-center gap-0.5 text-slate-900">
              <i data-lucide="home" class="w-5 h-5"></i>
              <span>Home</span>
            </a>
          </li>
          <li>
            <a href="wallet.html" class="flex flex-col items-center gap-0.5 hover:text-slate-900">
              <i data-lucide="wallet-cards" class="w-5 h-5"></i>
              <span>Wallet</span>
            </a>
          </li>
          <li>
            <a href="profile.html" class="flex flex-col items-center gap-0.5 hover:text-slate-900">
              <i data-lucide="user" class="w-5 h-5"></i>
              <span>Profile</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <script>
      if (window.lucide) {
        window.lucide.createIcons();
      }
    </script>
  </body>
</html>
