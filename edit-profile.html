<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile · MessPay Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pastelBlue: '#bfdbfe',
              pastelBlueSoft: '#e0f2fe',
              mintGreen: '#a7f3d0',
              mintGreenSoft: '#d1fae5',
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-pastelBlueSoft to-mintGreenSoft text-slate-900">
    <header class="border-b border-white/40 bg-white/60 backdrop-blur sticky top-0 z-10">
      <div class="max-w-4xl mx-auto flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <span
            class="inline-flex h-9 w-9 items-center justify-center rounded-2xl bg-gradient-to-tr from-pastelBlue to-mintGreen shadow-sm"
          >
            <i data-lucide="edit-3" class="w-5 h-5 text-slate-800"></i>
          </span>
          <div class="leading-tight">
            <p class="font-semibold tracking-tight">MessPay</p>
            <p class="text-xs text-slate-600">Edit profile</p>
          </div>
        </div>
        <a
          href="profile.html"
          class="px-3 py-1.5 rounded-full text-slate-800/80 bg-white/70 hover:bg-white shadow-sm text-xs transition"
          >Cancel</a
        >
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 flex items-start justify-center">
      <div
        class="bg-white/85 backdrop-blur rounded-[18px] shadow-lg border border-white/80 w-full max-w-lg p-5 sm:p-6 space-y-4"
      >
        <div class="flex items-center gap-3">
          <div
            class="h-10 w-10 rounded-[16px] bg-gradient-to-tr from-pastelBlue to-pastelBlueSoft flex items-center justify-center shadow-sm"
          >
            <i data-lucide="user-round" class="w-5 h-5 text-slate-900"></i>
          </div>
          <div class="leading-tight">
            <p class="text-sm font-semibold tracking-tight">Update student details</p>
            <p class="text-[11px] text-slate-500">Roll number and biometric ID are managed by admins.</p>
          </div>
        </div>

        <form id="edit-profile-form" class="space-y-3 text-sm">
          <div>
            <label for="edit-full-name" class="block text-xs font-medium text-slate-700 mb-1.5">Full Name</label>
            <input
              id="edit-full-name"
              type="text"
              class="w-full rounded-xl border border-slate-200 bg-slate-50/70 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pastelBlue focus:border-transparent"
            />
          </div>

          <div class="grid gap-3 sm:grid-cols-2">
            <div>
              <label for="edit-roll-number" class="block text-xs font-medium text-slate-700 mb-1.5"
                >Roll Number (read-only)</label
              >
              <input
                id="edit-roll-number"
                type="text"
                disabled
                class="w-full rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-500 cursor-not-allowed"
              />
            </div>
            <div>
              <label for="edit-room-number" class="block text-xs font-medium text-slate-700 mb-1.5"
                >Hostel Room Number</label
              >
              <input
                id="edit-room-number"
                type="text"
                class="w-full rounded-xl border border-slate-200 bg-slate-50/70 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-mintGreen focus:border-transparent"
              />
            </div>
          </div>

          <div>
            <label for="edit-phone" class="block text-xs font-medium text-slate-700 mb-1.5">Phone</label>
            <input
              id="edit-phone"
              type="tel"
              class="w-full rounded-xl border border-slate-200 bg-slate-50/70 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-mintGreen focus:border-transparent"
              placeholder="+91-90000-00000"
            />
          </div>

          <div>
            <label for="edit-fingerprint-id" class="block text-xs font-medium text-slate-700 mb-1.5"
              >Fingerprint ID (read-only)</label
            >
            <input
              id="edit-fingerprint-id"
              type="text"
              disabled
              class="w-full rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-500 cursor-not-allowed"
            />
          </div>

          <div class="flex items-center justify-end gap-2 pt-2">
            <a
              href="profile.html"
              class="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-800 hover:bg-slate-50"
            >
              <span>Cancel</span>
            </a>
            <button
              type="submit"
              class="inline-flex items-center gap-1.5 rounded-full bg-slate-900 text-white px-4 py-1.5 text-xs font-medium shadow-sm hover:bg-slate-800"
            >
              <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>
              <span>Save Changes</span>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script type="module">
      import { loadUserProfile, updateStudentProfile } from './js/database.js';

      const MOCK_STUDENT_ID = 'demo-student-id'; // TODO: replace with real logged-in student ID.

      async function bootstrap() {
        // Reuse loadUserProfile to fetch data, then map into the form.
        // Since loadUserProfile writes into the profile IDs, we instead fetch directly when Firebase is available.
        let studentData = null;

        if (window.firebase && typeof window.firebase.database === 'function') {
          const db = window.firebase.database();
          const snapshot = await db.ref('students').child(MOCK_STUDENT_ID).get();
          if (snapshot.exists()) {
            studentData = snapshot.val();
          }
        }

        if (!studentData) {
          studentData = {
            fullName: 'Demo Student',
            rollNumber: '22CS123',
            hostelRoom: 'A-212',
            fingerprintId: 'FP-987654',
            phone: '+91-90000-00000',
          };
        }

        document.getElementById('edit-full-name').value = studentData.fullName || '';
        document.getElementById('edit-roll-number').value = studentData.rollNumber || '';
        document.getElementById('edit-room-number').value = studentData.hostelRoom || '';
        document.getElementById('edit-phone').value = studentData.phone || '';
        document.getElementById('edit-fingerprint-id').value = studentData.fingerprintId || '';
      }

      const form = document.getElementById('edit-profile-form');
      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const newData = {
          fullName: document.getElementById('edit-full-name').value.trim(),
          hostelRoom: document.getElementById('edit-room-number').value.trim(),
          phone: document.getElementById('edit-phone').value.trim(),
        };

        try {
          await updateStudentProfile(MOCK_STUDENT_ID, newData);
          alert('Profile Updated Successfully!');
          window.location.href = 'profile.html';
        } catch (error) {
          console.error(error);
          alert('Failed to update profile. Please try again.');
        }
      });

      bootstrap();

      if (window.lucide) {
        window.lucide.createIcons();
      }
    </script>
  </body>
</html>
